name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Validate that the tag matches src/version.zig ───
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SRC=$(grep 'pub const version' src/version.zig | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$SRC" ]; then
            echo "::error::Tag v$TAG does not match src/version.zig ($SRC)"
            echo "  Update src/version.zig before tagging."
            exit 1
          fi
          echo "✓ Tag v$TAG matches src/version.zig"

      - name: Check CHANGELOG entry
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for [$TAG]"
            exit 1
          fi
          echo "✓ CHANGELOG.md has entry for $TAG"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu
            os: ubuntu-latest
            artifact: meshguard-linux-amd64
            ext: ""
            sodium: true
          - target: aarch64-linux-gnu
            os: ubuntu-latest
            artifact: meshguard-linux-arm64
            ext: ""
            sodium: true
          - target: x86_64-windows
            os: ubuntu-latest
            artifact: meshguard-windows-amd64
            ext: ".exe"
            sodium: false
          - target: x86_64-freebsd
            os: ubuntu-latest
            artifact: meshguard-freebsd-amd64
            ext: ""
            sodium: false
          - target: x86_64-macos
            os: ubuntu-latest
            artifact: meshguard-macos-amd64
            ext: ""
            sodium: false
          - target: aarch64-macos
            os: ubuntu-latest
            artifact: meshguard-macos-arm64
            ext: ""
            sodium: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: matrix.sodium
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Rename artifact
        run: mv zig-out/bin/meshguard${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Flatten artifacts into release dir
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          # Bundle wintun.dll for Windows
          cp deps/wintun/wintun.dll release/wintun.dll

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Extract changelog for this version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[$TAG\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/*
