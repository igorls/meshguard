name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Validate that the tag matches source/package release metadata ───
  validate:
    runs-on: [self-hosted, zig]
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SRC=$(grep 'pub const version' src/version.zig | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$SRC" ]; then
            echo "::error::Tag v$TAG does not match src/version.zig ($SRC)"
            echo "  Update src/version.zig before tagging."
            exit 1
          fi
          echo "✓ Tag v$TAG matches src/version.zig"

          ZON=$(grep '^[[:space:]]*\.version' build.zig.zon | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$ZON" ]; then
            echo "::error::Tag v$TAG does not match build.zig.zon ($ZON)"
            echo "  Update build.zig.zon before tagging."
            exit 1
          fi
          echo "✓ Tag v$TAG matches build.zig.zon"

          MAJOR=$(grep 'pub const major' src/version.zig | sed 's/.*= \([0-9]*\);/\1/')
          MINOR=$(grep 'pub const minor' src/version.zig | sed 's/.*= \([0-9]*\);/\1/')
          PATCH=$(grep 'pub const patch' src/version.zig | sed 's/.*= \([0-9]*\);/\1/')
          COMPONENTS="$MAJOR.$MINOR.$PATCH"
          if [ "$TAG" != "$COMPONENTS" ]; then
            echo "::error::Tag v$TAG does not match src/version.zig components ($COMPONENTS)"
            exit 1
          fi
          echo "✓ Tag v$TAG matches semantic version components"

      - name: Check CHANGELOG entry
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for [$TAG]"
            exit 1
          fi
          echo "✓ CHANGELOG.md has entry for $TAG"

  build:
    needs: validate
    runs-on: [self-hosted, zig]
    strategy:
      matrix:
        include:
          - target: ""
            artifact: meshguard-linux-amd64
            ext: ""
            build_args: ""
          - target: aarch64-linux-gnu
            artifact: meshguard-linux-arm64
            ext: ""
            build_args: "-Dno-sodium=true"
          - target: x86_64-windows
            artifact: meshguard-windows-amd64
            ext: ".exe"
            build_args: ""
          - target: x86_64-freebsd
            artifact: meshguard-freebsd-amd64
            ext: ""
            build_args: ""
          - target: x86_64-macos
            artifact: meshguard-macos-amd64
            ext: ""
            build_args: ""
          - target: aarch64-macos
            artifact: meshguard-macos-arm64
            ext: ""
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast ${{ matrix.build_args }}
          else
            zig build -Doptimize=ReleaseFast ${{ matrix.build_args }}
          fi

      - name: Rename artifact
        run: mv zig-out/bin/meshguard${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: [self-hosted, zig]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          cp deps/wintun/wintun.dll release/wintun.dll

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Extract changelog for this version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          awk "/^## \[$TAG\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/*
